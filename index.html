<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Rasca y Gana</title>
  <meta name="description" content="Tarjeta de rascar personalizable con premios, colores y logo propios.">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-header">
    <img id="app-logo" alt="logo" style="display:none;">
    <h1 id="app-title"></h1>
    <button id="settings-btn" title="Configuracion" aria-label="Configuracion">⚙</button>
  </div>

  <div id="start-screen" class="screen">
    <div class="start-wrap">
      <img id="start-logo" class="start-logo" alt="logo" style="display:none;">
      <h2 id="start-title" class="start-title"></h2>
      <button class="btn btn-primary start-btn" id="start-btn">RASCA Y GANA</button>
    </div>
  </div>

  <main id="game-screen" class="hidden"></main>

  <div id="admin-screen" class="screen hidden"></div>

  <div id="pin-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h3 id="pin-title">Acceso de administrador</h3>
      <input type="password" id="pin-input" inputmode="numeric" placeholder="PIN" autocomplete="off">
      <p class="pin-error" id="pin-error"></p>
      <div class="overlay-actions">
        <button class="btn btn-primary" id="pin-submit-btn">Entrar</button>
        <button class="btn btn-ghost" id="pin-cancel-btn">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="result-modal" class="modal">
    <div class="modal-box">
      <img id="result-photo" class="result-photo" alt="" style="display:none;">
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="result-play-again-btn">Jugar de nuevo</button>
        <button class="btn btn-ghost" id="result-close-btn">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/scratch.js"></script>
  <script src="js/game.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
